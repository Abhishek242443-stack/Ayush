<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayush Photo Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #7c5cbf;
    --accent2: #e96ba0;
    --dark: #0f0c1a;
    --card-bg: rgba(255,255,255,0.07);
    --glass: rgba(255,255,255,0.12);
    --text: #f0ecff;
    --muted: rgba(240,236,255,0.6);
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── WELCOME SCREEN ── */
  #welcome {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: linear-gradient(135deg, #0f0c1a 0%, #1a0f2e 40%, #2d1b4e 70%, #1a0f2e 100%);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  #welcome.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.04);
  }

  .welcome-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: float 8s ease-in-out infinite;
  }

  .orb1 { width: 500px; height: 500px; background: #7c5cbf; top: -15%; left: -10%; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: #e96ba0; bottom: -10%; right: -5%; animation-delay: -3s; }
  .orb3 { width: 300px; height: 300px; background: #5b8dee; top: 40%; left: 50%; animation-delay: -5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .welcome-content {
    position: relative;
    z-index: 1;
    max-width: 700px;
  }

  .badge {
    display: inline-block;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    backdrop-filter: blur(10px);
    animation: fadeSlideDown 0.8s ease forwards;
  }

  .welcome-title {
    font-size: clamp(2.4rem, 7vw, 5rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1.2rem;
    animation: fadeSlideUp 0.9s ease 0.2s both;
  }

  .welcome-title span {
    background: linear-gradient(135deg, #a78bfa, #ec4899, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-subtitle {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--muted);
    margin-bottom: 2.5rem;
    line-height: 1.7;
    animation: fadeSlideUp 0.9s ease 0.4s both;
  }

  .open-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeSlideUp 0.9s ease 0.6s both;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 30px rgba(124,92,191,0.5);
  }

  .open-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 40px rgba(124,92,191,0.7);
  }

  .open-btn:active { transform: scale(0.97); }

  .open-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: ripple 0.6s linear;
    pointer-events: none;
  }

  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  .btn-arrow { font-size: 1.2rem; transition: transform 0.2s; }
  .open-btn:hover .btn-arrow { transform: translateX(4px); }

  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.8; }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── GALLERY SCREEN ── */
  #gallery {
    min-height: 100vh;
    padding: 0 0 4rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease 0.1s, transform 0.7s ease 0.1s;
    pointer-events: none;
  }

  #gallery.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .gallery-header {
    padding: 3rem 2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .gallery-header h2 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
  }

  .gallery-header h2 span {
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.95rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s, transform 0.2s;
  }

  .back-btn:hover {
    background: rgba(255,255,255,0.18);
    transform: translateX(-3px);
  }

  .photo-count {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
  }

  /* ── LOADER ── */
  .loader-wrap {
    display: flex;
    justify-content: center;
    padding: 3rem;
  }

  .loader {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GRID ── */
  .grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .photo-card {
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--card-bg);
    aspect-ratio: 4/3;
    opacity: 0;
    transform: scale(0.92) translateY(20px);
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    animation: cardIn 0.5s ease forwards;
    box-shadow: var(--shadow);
  }

  .photo-card:hover {
    transform: scale(1.03);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .photo-card:hover img { transform: scale(1.1); }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    padding: 1.2rem;
  }

  .photo-card:hover .card-overlay { opacity: 1; }

  .card-overlay-text {
    font-size: 0.9rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .zoom-icon {
    width: 20px; height: 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── MODAL ── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(5, 3, 15, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(12px);
    transition: opacity 0.35s ease;
  }

  #modal.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    transform: scale(0.85);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  #modal.active .modal-inner { transform: scale(1); }

  .modal-inner img {
    display: block;
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
  }

  .modal-close {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    transition: background 0.2s, transform 0.2s;
    z-index: 210;
  }

  .modal-close:hover { background: rgba(255,255,255,0.28); transform: scale(1.1) rotate(90deg); }

  .modal-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    transition: background 0.2s, transform 0.2s;
    z-index: 210;
  }

  .modal-nav:hover { background: rgba(255,255,255,0.25); }
  #modal-prev { left: 1.5rem; }
  #modal-next { right: 1.5rem; }
  #modal-prev:hover { transform: translateY(-50%) translateX(-3px); }
  #modal-next:hover { transform: translateY(-50%) translateX(3px); }

  .modal-counter {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 0.85rem;
    color: var(--muted);
    z-index: 210;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 14px; padding: 0 1rem; }
    .modal-nav { display: none; }
  }

  @media (min-width: 601px) and (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 1200px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(124,92,191,0.5); border-radius: 3px; }

  /* ── AYUSH PHOTO REVEAL ── */
  #photoReveal {
    position: fixed;
    inset: 0;
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0f2e 0%, #0f0c1a 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    flex-direction: column;
  }
  #photoReveal.show { opacity: 1; pointer-events: all; }

  .reveal-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(167,139,250,0.3);
    animation: ringPulse 2s ease-in-out infinite;
  }
  .reveal-ring:nth-child(1) { width: 320px; height: 320px; animation-delay: 0s; }
  .reveal-ring:nth-child(2) { width: 430px; height: 430px; animation-delay: 0.3s; border-color: rgba(236,72,153,0.2); }
  .reveal-ring:nth-child(3) { width: 540px; height: 540px; animation-delay: 0.6s; border-color: rgba(96,165,250,0.15); }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  .reveal-photo-wrap {
    position: relative;
    z-index: 2;
    width: 220px; height: 220px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid transparent;
    background: linear-gradient(#0f0c1a, #0f0c1a) padding-box,
                linear-gradient(135deg, #a78bfa, #ec4899, #60a5fa) border-box;
    box-shadow: 0 0 60px rgba(167,139,250,0.4), 0 0 120px rgba(236,72,153,0.2);
    transform: scale(0) rotate(-10deg);
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s;
  }
  #photoReveal.show .reveal-photo-wrap { transform: scale(1) rotate(0deg); }

  .reveal-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .reveal-name {
    position: relative; z-index: 2;
    margin-top: 2rem;
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #ec4899, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease 0.75s, transform 0.6s ease 0.75s;
    letter-spacing: 0.05em;
  }
  #photoReveal.show .reveal-name { opacity: 1; transform: translateY(0); }

  .reveal-tagline {
    position: relative; z-index: 2;
    margin-top: 0.5rem;
    font-size: 1rem; color: var(--muted);
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.6s ease 1s, transform 0.6s ease 1s;
    text-align: center; padding: 0 2rem;
  }
  #photoReveal.show .reveal-tagline { opacity: 1; transform: translateY(0); }

  .reveal-continue-btn {
    position: relative; z-index: 2;
    margin-top: 2rem;
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none;
    padding: 13px 32px; border-radius: 50px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.6s ease 1.25s, transform 0.6s ease 1.25s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(124,92,191,0.4);
  }
  #photoReveal.show .reveal-continue-btn { opacity: 1; transform: translateY(0); }
  .reveal-continue-btn:hover { box-shadow: 0 8px 36px rgba(124,92,191,0.7); transform: translateY(-2px) !important; }

  .sparkle {
    position: absolute; width: 7px; height: 7px;
    border-radius: 50%; background: #a78bfa;
    animation: sparklePop var(--sd, 1.5s) ease-in-out infinite var(--ss, 0s);
    z-index: 3;
  }
  @keyframes sparklePop {
    0%, 100% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<section id="welcome">
  <div class="welcome-bg">
    <div class="stars" id="stars"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="welcome-content">
    <div class="badge">✦ Photography Collection</div>
    <h1 class="welcome-title">
      Welcome to<br><span id="typed-text"></span>
    </h1>
    <p class="welcome-subtitle">
      आयुष के नज़र से — कुछ पल, कुछ यादें।<br>
      जो देखा, जो महसूस किया, वो यहाँ कैद है।
    </p>
    <button class="open-btn" id="openGalleryBtn">
      <span>Open Gallery</span>
      <span class="btn-arrow">→</span>
    </button>
  </div>
</section>

<!-- AYUSH PHOTO REVEAL -->
<div id="photoReveal">
  <div class="reveal-ring"></div>
  <div class="reveal-ring"></div>
  <div class="reveal-ring"></div>
  <!-- ✦ Sparkles -->
  <div class="sparkle" style="top:25%;left:20%;--sd:1.8s;--ss:-0.2s;background:#a78bfa;"></div>
  <div class="sparkle" style="top:20%;left:70%;--sd:2.2s;--ss:-0.8s;background:#ec4899;"></div>
  <div class="sparkle" style="top:70%;left:15%;--sd:1.6s;--ss:-1.2s;background:#60a5fa;"></div>
  <div class="sparkle" style="top:75%;left:75%;--sd:2s;--ss:-0.5s;background:#a78bfa;"></div>
  <div class="sparkle" style="top:45%;left:88%;--sd:1.9s;--ss:-1.5s;background:#ec4899;"></div>
  <div class="sparkle" style="top:50%;left:8%;--sd:2.1s;--ss:-0.3s;background:#60a5fa;"></div>

  <div class="reveal-photo-wrap">
    <img src="ayush.jpg" alt="Ayush">
  </div>
  <div class="reveal-name">✨ Ayush ✨</div>
  <div class="reveal-tagline">आयुष के नज़र से — कुछ पल, कुछ यादें।</div>
  <button class="reveal-continue-btn" id="revealContinueBtn">
    <span>Gallery Dekho</span> <span>→</span>
  </button>
</div>

<!-- GALLERY SCREEN -->
<section id="gallery">
  <div class="gallery-header">
    <h2>Photo <span>Gallery</span></h2>
    <button class="back-btn" id="backBtn">← Back to Welcome</button>
  </div>
  <p class="photo-count">12 curated photos</p>

  <div class="loader-wrap" id="loader">
    <div class="loader"></div>
  </div>

  <div class="grid" id="photoGrid" style="display:none;"></div>
</section>

<!-- MODAL / LIGHTBOX -->
<div id="modal" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="modal-close" id="modalClose" title="Close">✕</button>
  <button class="modal-nav" id="modal-prev" title="Previous">‹</button>
  <button class="modal-nav" id="modal-next" title="Next">›</button>
  <div class="modal-inner">
    <img id="modalImg" src="" alt="Full size photo">
  </div>
  <div class="modal-counter" id="modalCounter">1 / 12</div>
</div>

<script>
  // ── STARS ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    const size = Math.random() * 2.5 + 0.5;
    s.className = 'star';
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2 + Math.random()*4}s;
      --delay:${-Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  // ── TYPING EFFECT ──
  const typedEl = document.getElementById('typed-text');
  const words = ['Ayush Gallery', 'Beautiful Moments', 'Ayush Gallery'];
  let wi = 0, ci = 0, deleting = false;

  function type() {
    const word = words[wi % words.length];
    if (!deleting) {
      typedEl.textContent = word.slice(0, ++ci);
      if (ci === word.length) {
        if (wi === 0) { deleting = false; setTimeout(type, 3000); return; }
        deleting = true; setTimeout(type, 1800); return;
      }
    } else {
      typedEl.textContent = word.slice(0, --ci);
      if (ci === 0) { deleting = false; wi++; }
    }
    setTimeout(type, deleting ? 60 : 90);
  }
  setTimeout(type, 800);

  const photos = [
    { url: 'photo1.jpg',  title: 'Photo 1',  loc: 'Ayush ' },
    { url: 'photo2.jpg',  title: 'Photo 2',  loc: 'Ayush ' },
    { url: 'photo3.jpg',  title: 'Photo 3',  loc: 'Ayush ' },
    { url: 'photo4.jpg',  title: 'Photo 4',  loc: 'Ayush ' },
    { url: 'photo5.jpg',  title: 'Photo 5',  loc: 'Ayush ' },
    { url: 'photo6.jpg',  title: 'Photo 6',  loc: 'Ayush ' },
    { url: 'photo7.jpg',  title: 'Photo 7',  loc: 'Ayush ' },
    { url: 'photo8.jpg',  title: 'Photo 8',  loc: 'Ayush ' },
    { url: 'photo9.jpg',  title: 'Photo 9',  loc: 'Ayush ' },
    { url: 'photo10.jpg', title: 'Photo 10', loc: 'Ayush ' },
    { url: 'photo11.jpg', title: 'Photo 11', loc: 'Ayush ' },
    { url: 'photo12.jpg', title: 'Photo 12', loc: 'Ayush ' },
  ];

  let currentIndex = 0;
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalCounter = document.getElementById('modalCounter');

  // ── RIPPLE ──
  function addRipple(btn) {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 2;
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  }

  // ── OPEN GALLERY ──
  const openBtn = document.getElementById('openGalleryBtn');
  addRipple(openBtn);
  openBtn.addEventListener('click', () => {
    // Step 1: Hide welcome, show Ayush photo reveal
    document.getElementById('welcome').classList.add('hidden');
    const reveal = document.getElementById('photoReveal');
    reveal.classList.add('show');
  });

  // Step 2: Continue to gallery from reveal screen
  document.getElementById('revealContinueBtn').addEventListener('click', () => {
    const reveal = document.getElementById('photoReveal');
    reveal.style.transition = 'opacity 0.5s ease';
    reveal.style.opacity = '0';
    setTimeout(() => {
      reveal.classList.remove('show');
      reveal.style.opacity = '';
      const galleryEl = document.getElementById('gallery');
      galleryEl.classList.add('visible');
      loadGallery();
    }, 500);
  });

  // ── BACK ──
  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('welcome').classList.remove('hidden');
    document.getElementById('gallery').classList.remove('visible');
    document.getElementById('photoReveal').classList.remove('show');
  });

  // ── LOAD GALLERY ──
  function loadGallery() {
    const grid = document.getElementById('photoGrid');
    if (grid.children.length > 0) return;
    const loader = document.getElementById('loader');

    setTimeout(() => {
      loader.style.display = 'none';
      grid.style.display = 'grid';
      photos.forEach((photo, i) => {
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.style.animationDelay = `${i * 0.07}s`;
        card.innerHTML = `
          <img src="${photo.url}" alt="${photo.title}" loading="lazy">
          <div class="card-overlay">
            <div class="card-overlay-text">
              <div class="zoom-icon">⊕</div>
              <span>${photo.title} · ${photo.loc}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => openModal(i));
        grid.appendChild(card);
      });
    }, 1200);
  }

  // ── MODAL ──
  function openModal(index) {
    currentIndex = index;
    updateModal();
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  function updateModal() {
    modalImg.src = photos[currentIndex].url;
    modalImg.alt = photos[currentIndex].title;
    modalCounter.textContent = `${currentIndex + 1} / ${photos.length}`;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  document.getElementById('modal-prev').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    updateModal();
  });

  document.getElementById('modal-next').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % photos.length;
    updateModal();
  });

  document.addEventListener('keydown', e => {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + photos.length) % photos.length; updateModal(); }
    if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % photos.length; updateModal(); }
  });

  // ── TOUCH SWIPE ──
  let touchStartX = 0;
  modal.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  modal.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      currentIndex = dx < 0
        ? (currentIndex + 1) % photos.length
        : (currentIndex - 1 + photos.length) % photos.length;
      updateModal();
    }
  });
</script>
</body>
</html>
